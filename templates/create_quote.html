<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Quotation</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<style>
:root {
    --gold: #b8860b;
    --charcoal: #111827;
    --soft: #f7f5f1;
    --light: #f2f2f2;
}
body {
    background: #ece9e1;
    font-family: 'Inter', Arial, sans-serif;
    color: #111827;
}
.page-shell {
    min-height: 100vh;
    padding: 28px;
}
.top-panel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
}
.brand-badge {
    display: flex;
    align-items: center;
    gap: 16px;
}
.brand-box {
    width: 70px;
    height: 70px;
    border-radius: 18px;
    border: 2px solid var(--gold);
    background: #fff8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.brand-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
.brand-text {
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.brand-text .title {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 1px;
}
.brand-text .subtitle {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 4px;
}
.brand-text .tagline {
    color: var(--gold);
    font-style: italic;
    margin-top: 6px;
    font-size: 12px;
}
.hero-card {
    width: 100%;
    max-width: 420px;
    background: var(--charcoal);
    color: #f8f4e8;
    border-radius: 18px;
    padding: 18px 22px;
}
.hero-card .label {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #d1d5db;
}
.hero-card .headline {
    font-size: 22px;
    font-weight: 900;
    margin: 8px 0 16px;
}
.hero-card .meta {
    font-size: 11px;
    line-height: 1.7;
    color: #d1d5db;
}
.hero-card .meta strong {
    color: #fff;
    display: inline-block;
    min-width: 90px;
}
.form-panel,
.preview-panel {
    border-radius: 20px;
    background: #fff;
    box-shadow: 0 18px 45px rgba(17,24,39,.08);
}
.form-panel {
    overflow: hidden;
}
.card-header-custom {
    background: var(--charcoal);
    color: #fff;
    padding: 24px 28px;
    font-size: 20px;
    font-weight: 900;
    border-bottom: 5px solid var(--gold);
}
.form-section {
    padding: 28px;
}
.section-title {
    color: var(--charcoal);
    font-size: 15px;
    font-weight: 800;
    margin-bottom: 18px;
    border-bottom: 3px solid #f3f2ef;
    padding-bottom: 10px;
}
.form-control,
textarea.form-control {
    border-radius: 14px;
    border: 1px solid #ddd;
    padding: 14px 16px;
    min-height: 46px;
}
.form-control:focus,
textarea.form-control:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 .2rem rgba(184,134,11,.12);
}
.form-label {
    font-weight: 700;
    color: #3d4856;
}
.btn-gold {
    background: var(--gold);
    border: none;
    color: #111827;
    padding: 14px 30px;
    font-weight: 700;
    border-radius: 14px;
    box-shadow: 0 14px 28px rgba(184,134,11,.12);
}
.btn-gold:hover {
    background: #a77d0e;
}
.preview-panel {
    padding: 28px;
    min-height: 560px;
}
.preview-panel h4 {
    color: var(--gold);
    margin-bottom: 18px;
    font-weight: 800;
}
.summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    border-bottom: 1px solid #ece8df;
    padding-bottom: 10px;
    font-size: 14px;
}
.summary-item strong {
    font-size: 14px;
    font-weight: 800;
}
.quote-total {
    font-size: 38px;
    font-weight: 900;
    color: var(--gold);
}
.preview-note {
    font-size: 12px;
    color: #d1d5db;
}
.text-gold {
    color: var(--gold);
}
    #sizesBuilder .d-flex {
        flex-wrap: wrap;
    }
    #sizesBuilder .d-flex > * {
        min-width: 0;
        flex: 1 1 100%;
    }
    #sizesBuilder .d-flex .form-control {
        width: 100%;
    }
    #sizesBuilder .d-flex .btn {
        width: 100%;
    }
@media (max-width: 1200px) {
    .top-panel { flex-direction: column; align-items: stretch; }
    .hero-card { max-width: 100%; }
}
@media (max-width: 992px) {
    .page-shell { padding: 18px; }
    .preview-panel { min-height: auto; }
    .section-title { font-size: 14px; }
    .card-header-custom { font-size: 18px; padding: 20px 24px; }
}
@media (max-width: 768px) {
    .page-shell { padding: 14px; }
    .top-panel { gap: 16px; }
    .brand-box { width: 60px; height: 60px; }
    .brand-text .title { font-size: 22px; }
    .hero-card { padding: 18px; }
    .form-section { padding: 20px; }
    .preview-panel { padding: 20px; }
    .btn-gold { width: 100%; }
    .summary-item { flex-direction: column; align-items: flex-start; gap: 6px; }
    .quote-total { font-size: 32px; }
}
@media (max-width: 576px) {
    .page-shell { padding: 12px; }
    .hero-card .headline { font-size: 20px; }
    .brand-text .subtitle,
    .brand-text .tagline { font-size: 11px; }
    .form-section { padding: 18px; }
    .preview-panel { padding: 18px; }
}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-gold" href="/">UNCLE ZALA</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" href="/">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/create">Create Quote</a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link text-danger" href="/logout">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="page-shell container-fluid">
    <div class="top-panel">
    
        
    </div>
    <div class="row gy-4">
        <div class="col-xl-8">
            <div class="form-panel">
                <div class="card-header-custom">Quotation Information</div>
                <div class="form-section">
                    <form method="POST">
                        <div class="section-title">Customer Details</div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Customer Name</label>
                                <input type="text" name="customer_name" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="text" name="customer_phone" class="form-control">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Address</label>
                            <textarea name="customer_address" rows="3" class="form-control"></textarea>
                        </div>
                        <div class="section-title">Project Information</div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <input type="text" name="description" class="form-control" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Material</label>
                                    <div class="input-group">
                                        <select name="material" id="materialSelect" class="form-control" required>
                                            
                                            <option value="Granite">Choose material Type</option>
                                            <option value="Granite">Granite</option>
                                            <option value="Marble">Marble</option>
                                            <option value="Quartz">Quartz</option>
                                            <option value="Shimmer">Shimmer</option>
                                            <option value="Dekton">Dekton</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Sizes (mm) & Price</label>
                                <div class="mb-2">
                                    <select id="sizePreset" class="form-control">
                                        <option value="">Choose a preset size</option>
                                    </select>
                                </div>
                                <div id="sizesBuilder">
                                    <div class="d-flex gap-2 mb-2">
                                        <input type="text" id="sizeWidth" class="form-control" placeholder="Width (e.g. 900)">
                                        <input type="text" id="sizeHeight" class="form-control" placeholder="Height (e.g. 600)">
                                        <input type="number" id="sizeQty" class="form-control" placeholder="Qty" value="1" min="1" style="width:70px;">
                                        <input type="number" step="0.01" id="sizePrice" class="form-control" placeholder="Price" min="0" style="width:90px;">
                                        <button type="button" id="addSizeBtn" class="btn btn-gold">Add Size</button>
                                    </div>
                                    <div id="sizesList" style="max-height:180px; overflow:auto; margin-top:6px;"></div>
                                    <input type="hidden" name="sizes" id="sizesInput">
                                </div>
                                <small class="text-muted">Add multiple size rows - each can have its own price.</small>
                            </div>
                        </div>
                        <div class="section-title">Pricing Details</div>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Quantity</label>
                                <input type="number" id="qty" name="quantity" class="form-control" value="1" min="1" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Unit Price</label>
                                <input type="number" step="0.01" id="price" name="unit_price" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Labour %</label>
                                <input type="number" id="labour" name="labour_percentage" class="form-control" value="40" min="0" required>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-gold btn-lg">
                                <i class="fa fa-file-pdf me-2"></i>
                                Generate Quotation PDF
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-xl-4">
            <div class="preview-panel">
                <h4>Quote Summary</h4>
                <div class="summary-item">
                    <span>Subtotal</span>
                    <strong id="subtotal">R 0.00</strong>
                </div>
                <div class="summary-item">
                    <span>Labour</span>
                    <strong id="labourCost">R 0.00</strong>
                </div>
                <div class="summary-item">
                    <span>Total</span>
                    <strong id="total">R 0.00</strong>
                </div>
                <div class="text-center mt-5">
                    <div class="quote-total" id="quoteTotal">R 0.00</div>
                    <div class="preview-note mt-2">Estimated total before PDF generation</div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const qty = document.getElementById('qty');
    const price = document.getElementById('price');
    const labour = document.getElementById('labour');
    const materialSelect = document.getElementById('materialSelect');
    const sizePreset = document.getElementById('sizePreset');
    const addSizeBtn = document.getElementById('addSizeBtn');
    const sizeWidth = document.getElementById('sizeWidth');
    const sizeHeight = document.getElementById('sizeHeight');
    const sizeQty = document.getElementById('sizeQty');
    const sizePrice = document.getElementById('sizePrice');
    const sizesList = document.getElementById('sizesList');
    const sizesInput = document.getElementById('sizesInput');
    const quoteForm = document.querySelector('form');

    if (!qty || !price || !labour || !materialSelect || !sizePreset || !addSizeBtn || !sizeWidth || !sizeHeight || !sizeQty || !sizePrice || !sizesList || !sizesInput || !quoteForm) {
        return;
    }

    const standardModeNote = document.createElement('small');
    standardModeNote.className = 'text-muted';
    standardModeNote.id = 'standardModeNote';
    price.insertAdjacentElement('afterend', standardModeNote);

    let sizes = [];

    const materialSizes = {
        Granite: ['900 x 600', '1200 x 600', '1800 x 900'],
        Marble: ['1000 x 600', '1500 x 750', '2000 x 900'],
        Quartz: ['900 x 500', '1200 x 700', '2400 x 1200'],
        Shimmer: ['1000 x 500', '1200 x 600', '1600 x 800'],
        Dekton: ['1100 x 650', '1500 x 900', '3000 x 1400'],
        Other: ['900 x 600', '1200 x 600', '1800 x 900']
    };

    function populateSizePresets() {
        sizePreset.innerHTML = '<option value="">Choose a preset size</option>';
        const sizes = materialSizes[materialSelect.value] || materialSizes.Other;
        sizes.forEach((preset) => {
            const option = document.createElement('option');
            option.value = preset;
            option.textContent = preset;
            sizePreset.appendChild(option);
        });
    }

    function applySizePreset() {
        const value = sizePreset.value;
        if (!value) {
            return;
        }
        const [width, height] = value.split(' x ').map((v) => v.trim());
        sizeWidth.value = width;
        sizeHeight.value = height;
    }

    function calculate() {
        const l = parseFloat(labour.value) || 0;
        const q = sizes.length > 0 ? sizes.reduce((acc, s) => acc + (parseInt(s.qty) || 0), 0) : (parseFloat(qty.value) || 0);
        const subtotal = sizes.length > 0 ? sizes.reduce((acc, s) => acc + (parseInt(s.qty) || 0) * (parseFloat(s.price) || 0), 0) : (q * (parseFloat(price.value) || 0));
        const labourAmount = subtotal * (l / 100);
        const total = subtotal + labourAmount;

        document.getElementById('subtotal').innerText = 'R ' + subtotal.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('labourCost').innerText = 'R ' + labourAmount.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('total').innerText = 'R ' + total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        document.getElementById('quoteTotal').innerText = 'R ' + total.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function updateFormState() {
        const usingSizes = sizes.length > 0;
        qty.disabled = usingSizes;
        price.disabled = usingSizes;
        qty.required = !usingSizes;
        price.required = !usingSizes;
        standardModeNote.innerText = usingSizes ? 'Custom sizes active. Standard quantity and unit price are ignored.' : 'Use quantity + unit price when not adding custom sizes.';
    }

    function renderSizes() {
        sizesList.innerHTML = '';
        sizes.forEach((s, idx) => {
            const row = document.createElement('div');
            row.className = 'd-flex align-items-center justify-content-between p-2 border rounded mb-2 flex-wrap';
            row.innerHTML = `<div><strong>${s.size}</strong> <small class="text-muted">× ${s.qty}</small> <span class="badge bg-secondary ms-2">${s.material}</span> <small class="text-gold ms-2">R ${parseFloat(s.price || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</small></div><div><button type="button" data-idx="${idx}" class="btn btn-sm btn-outline-secondary remove-size">Remove</button></div>`;
            sizesList.appendChild(row);
        });
        sizesInput.value = JSON.stringify(sizes);
        updateFormState();
        calculate();
    }

    addSizeBtn.addEventListener('click', () => {
        const w = sizeWidth.value.trim();
        const h = sizeHeight.value.trim();
        const q = parseInt(sizeQty.value) || 1;
        const p = parseFloat(sizePrice.value) || 0;

        if (!w || !h) {
            alert('Please enter both width and height for the size.');
            return;
        }
        if (p <= 0) {
            alert('Please enter a valid price for this size.');
            return;
        }

        const sizeText = `${w} x ${h}`;
        sizes.push({ material: materialSelect.value, size: sizeText, qty: q, price: p });
        sizeWidth.value = '';
        sizeHeight.value = '';
        sizeQty.value = 1;
        sizePrice.value = '';
        sizePreset.value = '';
        renderSizes();
    });

    sizePreset.addEventListener('change', applySizePreset);

    sizesList.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-size')) {
            const idx = parseInt(e.target.getAttribute('data-idx'));
            sizes.splice(idx, 1);
            renderSizes();
        }
    });

    quoteForm.addEventListener('submit', () => {
        sizesInput.value = JSON.stringify(sizes);
        updateFormState();
    });

    materialSelect.addEventListener('change', () => {
        populateSizePresets();
        sizePreset.value = '';
    });
    sizePreset.addEventListener('change', applySizePreset);
    qty.addEventListener('input', calculate);
    price.addEventListener('input', calculate);
    labour.addEventListener('input', calculate);

    populateSizePresets();
    calculate();
});
</script>
</body>
</html>
