<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Quotation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

:root{
    --gold:#c9a227;
    --dark:#111111;
    --light:#f5f5f5;
}

body{
    background:#f3f4f6;
    font-family:Arial, Helvetica, sans-serif;
}

/* Sidebar */

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:var(--dark);
    color:white;
}

.logo-section{
    text-align:center;
    padding:30px 20px;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.logo-circle{
    width:80px;
    height:80px;
    background:var(--gold);
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
}

.company{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
}

.subtitle{
    color:#bbb;
    font-size:13px;
}

.sidebar-menu{
    padding:20px;
}

.sidebar-menu a{
    display:block;
    color:white;
    text-decoration:none;
    padding:14px;
    border-radius:8px;
    margin-bottom:10px;
    transition:.3s;
}

.sidebar-menu a:hover{
    background:var(--gold);
}

.sidebar-menu i{
    width:25px;
}

/* Main */

.main{
    margin-left:260px;
    padding:30px;
}

.page-title{
    font-size:32px;
    font-weight:bold;
}

.page-subtitle{
    color:#666;
}

.form-card{
    background:white;
    border-radius:15px;
    box-shadow:0 3px 12px rgba(0,0,0,.08);
    overflow:hidden;
}

.card-header-custom{
    background:var(--dark);
    color:white;
    padding:18px 25px;
    font-size:18px;
    font-weight:bold;
    border-bottom:4px solid var(--gold);
}

.form-section{
    padding:30px;
}

.section-title{
    color:var(--gold);
    font-weight:bold;
    font-size:18px;
    margin-bottom:20px;
    border-bottom:2px solid #eee;
    padding-bottom:10px;
}

.form-control{
    border-radius:10px;
    padding:12px;
    border:1px solid #ddd;
}

.form-control:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 .2rem rgba(201,162,39,.15);
}

.form-label{
    font-weight:600;
    color:#444;
}

.btn-gold{
    background:var(--gold);
    border:none;
    color:white;
    padding:14px 25px;
    font-weight:bold;
    border-radius:10px;
}

.btn-gold:hover{
    background:#b88f1e;
    color:white;
}

.preview-card{
    background:linear-gradient(135deg,#111,#222);
    color:white;
    border-radius:15px;
    padding:25px;
    height:100%;
}

.preview-card h4{
    color:var(--gold);
}

.quote-total{
    font-size:36px;
    font-weight:800;
    color:var(--gold);
}

.summary-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
}

.top-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

@media(max-width:992px){

    .sidebar{
        display:none;
    }

    .main{
        margin-left:0;
    }

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo-section">

        <div class="logo-circle">
            "<img src="/static/logo.jpg" alt="Company Logo">"
        </div>

        <div class="company">
            UNCLE ZALA
        </div>

        <div class="subtitle">
            Granite & Marble
        </div>

    </div>

    <div class="sidebar-menu">

        <a href="/">
            <i class="fa fa-home"></i>
            Dashboard
        </a>

        <a href="/create">
            <i class="fa fa-file-circle-plus"></i>
            New Quotation
        </a>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <div class="top-actions">

        <div>

            <div class="page-title">
                Create Quotation
            </div>

            <div class="page-subtitle">
                Generate a professional quotation PDF
            </div>

        </div>

        <a href="/" class="btn btn-dark">
            Back to Dashboard
        </a>

    </div>

    <div class="row">

        <!-- FORM -->

        <div class="col-lg-8">

            <div class="form-card">

                <div class="card-header-custom">
                    Quotation Information
                </div>

                <div class="form-section">

                    <form method="POST">

                        <!-- CUSTOMER -->

                        <div class="section-title">
                            Customer Details
                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Customer Name
                                </label>

                                <input
                                    type="text"
                                    name="customer_name"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Phone Number
                                </label>

                                <input
                                    type="text"
                                    name="customer_phone"
                                    class="form-control"
                                >

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Address
                            </label>

                            <textarea
                                name="customer_address"
                                rows="3"
                                class="form-control"
                            ></textarea>

                        </div>

                        <!-- PROJECT -->

                        <div class="section-title">
                            Project Information
                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <input
                                type="text"
                                name="description"
                                class="form-control"
                                required
                            >

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Material
                                </label>

                                <input
                                    type="text"
                                    name="material"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Size
                                </label>

                                <input
                                    type="text"
                                    name="size"
                                    class="form-control"
                                    required
                                >

                            </div>

                        </div>

                        <!-- PRICING -->

                        <div class="section-title">
                            Pricing Details
                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Quantity
                                </label>

                                <input
                                    type="number"
                                    id="qty"
                                    name="quantity"
                                    class="form-control"
                                    value="1"
                                    required
                                >

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Unit Price
                                </label>

                                <input
                                    type="number"
                                    step="0.01"
                                    id="price"
                                    name="unit_price"
                                    class="form-control"
                                    required
                                >

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Labour %
                                </label>

                                <input
                                    type="number"
                                    id="labour"
                                    name="labour_percentage"
                                    value="40"
                                    class="form-control"
                                    required
                                >

                            </div>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-gold btn-lg mt-3"
                        >
                            <i class="fa fa-file-pdf"></i>
                            Generate Quotation PDF
                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- LIVE PREVIEW -->

        <div class="col-lg-4">

            <div class="preview-card">

                <h4>
                    Quote Summary
                </h4>

                <hr>

                <div class="summary-item">
                    <span>Subtotal</span>
                    <strong id="subtotal">
                        R 0.00
                    </strong>
                </div>

                <div class="summary-item">
                    <span>Labour</span>
                    <strong id="labourCost">
                        R 0.00
                    </strong>
                </div>

                <hr>

                <div class="text-center mt-4">

                    <div class="quote-total" id="total">
                        R 0.00
                    </div>

                    <small>
                        Estimated Total
                    </small>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const qty=document.getElementById('qty');
const price=document.getElementById('price');
const labour=document.getElementById('labour');

function calculate(){

    let q=parseFloat(qty.value)||0;
    let p=parseFloat(price.value)||0;
    let l=parseFloat(labour.value)||0;

    let subtotal=q*p;
    let labourAmount=subtotal*(l/100);
    let total=subtotal+labourAmount;

    document.getElementById('subtotal').innerText=
        "R "+subtotal.toLocaleString(undefined,{
            minimumFractionDigits:2
        });

    document.getElementById('labourCost').innerText=
        "R "+labourAmount.toLocaleString(undefined,{
            minimumFractionDigits:2
        });

    document.getElementById('total').innerText=
        "R "+total.toLocaleString(undefined,{
            minimumFractionDigits:2
        });

}

qty.addEventListener('input',calculate);
price.addEventListener('input',calculate);
labour.addEventListener('input',calculate);

calculate();

</script>

</body>
</html>
